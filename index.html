<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Ghost Hunter</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Press Start 2P', cursive;
            color: white; overflow: hidden;
        }

        /* Экран Босса */
        #game-screen {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; height: 100%;
        }

        #score-container { margin-top: 30px; font-size: 18px; text-shadow: 2px 2px black; }

        /* Полоска здоровья */
        .hp-bar-bg {
            width: 80%; height: 20px; background: #333;
            border: 3px solid #000; margin-top: 20px; position: relative;
        }
        .hp-bar-fill {
            width: 100%; height: 100%; background: linear-gradient(to right, #ff4e50, #f9d423);
            transition: width 0.2s;
        }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 10px; top: 5px; }

        #ghost-btn {
            background: none; border: none; outline: none; margin-top: 50px;
            transition: transform 0.1s; -webkit-tap-highlight-color: transparent;
        }
        #ghost-btn img { width: 70vw; max-width: 350px; }
        #ghost-btn:active { transform: scale(0.95); }

        /* Экран Магазина */
        #shop-screen {
            display: none; /* Скрыт по умолчанию */
            width: 100%; height: 80%;
            background: rgba(0, 40, 0, 0.9); /* Темно-зеленый полупрозрачный */
            padding-top: 20px; overflow-y: auto;
        }
        .shop-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 10px;
        }
        .item-card {
            background: #2d5a27; border: 2px solid #fff; border-radius: 10px;
            padding: 5px; display: flex; flex-direction: column; align-items: center; text-align: center;
        }
        .item-card img { width: 50px; height: 50px; margin-bottom: 5px; }
        .item-card span { font-size: 7px; margin-bottom: 5px; }
        .item-card button {
            font-family: 'Press Start 2P'; font-size: 6px; padding: 5px;
            background: #f8b500; border: none; cursor: pointer;
        }

        /* Нижнее меню */
        .bottom-nav {
            position: fixed; bottom: 20px; display: flex; gap: 20px;
        }
        .nav-btn {
            background: #1a3a1a; border: 2px solid #fff; color: white;
            padding: 15px 25px; font-family: 'Press Start 2P'; font-size: 12px;
            border-radius: 10px; cursor: pointer;
        }
        .nav-btn.active { background: #2d5a27; box-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

    <!-- Игровой экран -->
    <div id="game-screen">
        <div id="score-container">Кликов: <span id="score">0</span></div>
        
        <div class="hp-bar-bg">
            <div id="hp-fill" class="hp-bar-fill"></div>
            <div class="hp-text">Здоровье: <span id="hp-val">10000</span></div>
        </div>

        <button id="ghost-btn">
            <img src="ghost.png" alt="Ghost">
        </button>
    </div>

    <!-- Экран магазина -->
    <div id="shop-screen">
        <h2 style="text-align:center; font-size: 14px;">МАГАЗИН</h2>
        <div class="shop-grid">
            <!-- Пример зелья -->
            <div class="item-card">
                <img src="potion_red.png" alt="">
                <span>Зелье силы (Урон x2) 
                    Цена: 500</span>
                <button onclick="buyUpgrade(500, 2, 'power')">КУПИТЬ</button>
            </div>
            <!-- Добавь остальные карточки сюда по аналогии -->
             <div class="item-card">
                <img src="potion_red.png" alt="">
                <span>Зелье силы (Урон x3) 
                    Цена: 1000</span>
                <button onclick="buyUpgrade(1000, 3, 'power')">КУПИТЬ</button>
            </div>
            <div class="item-card">
                <img src="potion_red.png" alt="">
                <span>Зелье силы (Урон x4) 
                    Цена: 1500</span>
                <button onclick="buyUpgrade(1500, 4, 'power')">КУПИТЬ</button>
            </div>
            <div class="item-card">
                <img src="potion_green.png" alt="">
                <span>Мега зелье (Урон x10) 
                    Цена: 5000</span>
                <button onclick="buyUpgrade(5000, 10, 'power')">КУПИТЬ</button>
            </div>
        </div>
    </div>

    <!-- Навигация -->
    <div class="bottom-nav">
        <button class="nav-btn active" onclick="showScreen('game')">Босс</button>
        <button class="nav-btn" onclick="showScreen('shop')">Магазин</button>
    </div>

    <script>
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        // Игровые переменные
        let score = 0;
        let damage = 1; // Урон за один клик
        let bossHp = 10000;
        let maxHp = 10000;

        const scoreEl = document.getElementById('score');
        const hpFill = document.getElementById('hp-fill');
        const hpValEl = document.getElementById('hp-val');
        const ghostBtn = document.getElementById('ghost-btn');

        if (tg) { tg.expand(); tg.ready(); }

        // Клик по боссу
        ghostBtn.addEventListener('click', () => {
            score += damage;
            bossHp -= damage;

            if (bossHp <= 0) {
                alert("Босс побежден! Появился новый, посильнее.");
                maxHp = Math.floor(maxHp * 1.5);
                bossHp = maxHp;
            }

            updateUI();
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        });

        // Функция покупки
        function buyUpgrade(price, multiplier, type) {
            if (score >= price) {
                score -= price;
                if (type === 'power') {
                    damage *= multiplier;
                    alert("Урон увеличен! Теперь урон: " + damage);
                }
                updateUI();
            } else {
                alert("Недостаточно кликов!");
            }
        }

        // Обновление интерфейса
        function updateUI() {
            scoreEl.innerText = Math.floor(score);
            hpValEl.innerText = bossHp;
            let hpPercent = (bossHp / maxHp) * 100;
            hpFill.style.width = hpPercent + "%";
        }

        // Переключение экранов
        function showScreen(screen) {
            if (screen === 'game') {
                document.getElementById('game-screen').style.display = 'flex';
                document.getElementById('shop-screen').style.display = 'none';
            } else {
                document.getElementById('game-screen').style.display = 'none';
                document.getElementById('shop-screen').style.display = 'block';
            }
            
            // Обновляем активную кнопку в меню
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
