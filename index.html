<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Ghost Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-green: #1b3a1e;
            --light-green: #2d5a27;
            --accent-glow: rgba(76, 175, 80, 0.5);
        }

        body {
            margin: 0; padding: 0;
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            font-family: 'Press Start 2P', cursive;
            color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Заголовок счета */
        #header {
            margin-top: 40px;
            text-align: center;
        }
        .score-label { font-size: 24px; text-shadow: 3px 3px 0px #000; }
        .score-num { 
            display: inline-block; 
            color: #fff;
            font-size: 32px;
            text-shadow: 3px 3px 0px #000;
            margin-left: 10px;
        }
        
        /* Полоска здоровья (как на фото) */
        .hp-container {
            width: 70%; margin-top: 20px; text-align: center;
        }
        .hp-bar {
            width: 100%; height: 8px; background: #333;
            border: 2px solid #000; position: relative; margin-bottom: 5px;
        }
        #hp-fill {
            width: 100%; height: 100%; background: #ff4500; /* Оранжево-красный как на фото */
            box-shadow: 0 0 10px #ff4500; transition: width 0.2s;
        }
        .hp-label { font-size: 10px; text-shadow: 1px 1px #000; }

        /* Центральный Босс */
        #boss-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            width: 100%;
        }
        #ghost-btn {
            background: none; border: none; outline: none; cursor: pointer;
            transition: transform 0.05s; -webkit-tap-highlight-color: transparent;
        }
        #ghost-btn img { width: 75vw; max-width: 400px; filter: drop-shadow(0 0 20px rgba(0,0,0,0.8)); }
        #ghost-btn:active { transform: scale(0.95); }

        /* Экран Магазина */
        #shop-screen {
            display: none; position: absolute; top: 100px; bottom: 120px;
            width: 90%; background: rgba(13, 33, 13, 0.95);
            border: 3px solid var(--light-green); border-radius: 20px;
            padding: 15px; overflow-y: auto; z-index: 10;
        }
        .shop-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .item-card {
            background: #e8f5e9; border-radius: 12px; padding: 8px;
            display: flex; flex-direction: column; align-items: center; color: #1b3a1e;
        }
        .item-card img { width: 100%; max-width: 60px; margin-bottom: 5px; }
        .item-card .price { font-size: 6px; font-weight: bold; margin-bottom: 5px; text-align: center; }
        .item-card button {
            background: #2d5a27; color: white; border: none; border-radius: 5px;
            font-family: 'Press Start 2P'; font-size: 5px; padding: 5px; width: 100%;
        }

        /* Нижнее меню (Navigation) */
        .nav-bar {
            position: fixed; bottom: 30px; display: flex; gap: 15px;
            background: rgba(0, 20, 0, 0.7); padding: 10px 20px; border-radius: 25px;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
        }
        .nav-btn {
            background: linear-gradient(180deg, #2c4c2e 0%, #162b18 100%);
            border: 1px solid rgba(255,255,255,0.3); color: white;
            padding: 12px 25px; font-family: 'Press Start 2P'; font-size: 14px;
            border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .nav-btn.active {
            background: #3e7a3e; box-shadow: 0 0 15px var(--accent-glow);
            border-color: #fff;
        }
        .item-name {
            font-size: 6px; /*маленький пиксельный шрифт*/
            color: #1b3a1e; /* темно зеленый*/
            margin: 5px 0 2px 0;
            text-transform: uppercase;
        }
        .item-mult {
            font-size: 8px;
            font-weight: bold;
            color: #d32f1f;
            margin-bottom: 5px;
        }
        .price {
            font-size: 5px;
            color: #555;
            margin-bottom: 5px;
        }
        .price::after {
            content: "🪙"; /* иконка монетки после цены*/
        }
        .particle {
            position: fixed;
            pointer-events: none; /* чтобы частицы не мешали кликать */
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            z-index: 1000;
            animation: floatUp 0.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        .shake {
            animation: shakeAnim 0.1s linear double;
        }

        @keyframes shakeAnim {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-2px, -1px) rotate(-1deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            75% { transform: translate(2px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }
        .hit-flash {
            filter: brightness(0.5) sepia(1) saturate(10000%) hue-rotate(-50deg);
        }
    </style>
</head>
<body>

    <!-- Основной экран игры -->
    <div id="game-screen" style="display: contents;">
        <div id="header">
            <span class="score-label">Кликов:</span>
            <div class="score-num" id="score">0</div>
        </div>

        <div class="hp-container">
            <div class="hp-bar"><div id="hp-fill"></div></div>
            <div class="hp-label">Здоровье</div>
        </div>
    <div id="buff-status" style="height: 15px; margin-top: 10px; font-size: 10px; color: #00ff00; text-shadow: 1px 1px #000;
    text-align: center;"></div>

        <div id="boss-container">
            <button id="ghost-btn">
                <img src="ghost.png" alt="Ghost">
            </button>
        </div>
    </div>

    <!-- Экран магазина -->
    <div id="shop-screen">
        <div class="shop-grid" id="shop-items">
            <!-- Сюда добавим товары через JavaScript -->
        </div>
    </div>

    <!-- Навигация -->
    <div class="nav-bar">
        <button id="btn-boss" class="nav-btn active" onclick="switchTab('boss')">Босс</button>
        <button id="btn-shop" class="nav-btn" onclick="switchTab('shop')">Магазин</button>
    </div>

    <script>
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) { tg.expand(); tg.ready(); }

        let score = 0;
        let damage = 1;
        let bossMaxHp = 1000;
        let bossCurrentHp = 1000;
        let baseDamage = 1; // Постоянный урон
        let tempMultiplier = 1; // Временный множитель
        let buffTimer = null; // Переманная для хранения таймера

        // Данные товаров 
        const items = [
            { id: 1, name: "Энергетик", price: 500, mult: 2, duration: 60, multText: "x2", img: "potion_red.png" },
            { id: 2, name: "Энергетик", price: 750, mult: 3, duration: 50, multText: "x3", img: "potion_red.png" },
            { id: 3, name: "Энергетик", price: 1000, mult: 4, duration: 30, multText: "x4", img: "potion_red.png" },
            { id: 4, name: "Зелье силы", price: 2500, mult: 5, duration: 20, multText: "x5", img: "item2.png" },
            { id: 5, name: "Зелье силы", price: 3000, mult: 6, duration: 20, multText: "x6", img: "item2.png" },
            { id: 6, name: "Зелье силы", price: 5000, mult: 10, duration: 30, multText: "x10", img: "item2.png" },
            { id: 7, name: "Огромная сила", price: 10000, mult: 50, duration: 30, multText: "x50", img: "potion_green.png" }
        ];

        // Рендер магазина
        const shopGrid = document.getElementById('shop-items');
        shopGrid.innerHTML = ""; // Очищаем перед рендером

        items.forEach(item => {
            shopGrid.innerHTML += `
                <div class="item-card">
                    <img src="${item.img}" alt="${item.name}">
                    <div class="item-name">${item.name}</div>
                    <div class="item-mult">${item.multText}</div>
                    <div class="price">${item.price}</div>
                    <button onclick="buyItem(${item.price}, ${item.mult}, ${item.duration})">КУПИТЬ</button>
                </div>
            `;
        });

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('hp-fill').style.width = (bossCurrentHp / bossMaxHp * 100) + "%";
        }

        ghostBtn.addEventListener('click', (e) => {

            // 1. считаем урон
            let totalDamage = baseDamage * tempMultiplier;
            score += totalDamage;
            bossCurrentHp -= totalDamage;

            // 2. создаем эффект вылетающего текста и эмодзи
            createParticle(e.clientX, e.clientY, `+${totalDamage} 🔥`);

            // 3. эффект тряски босса
            ghostBtn.classList.remove('shake'); // сбрасываем анимацию
            void ghostBtn.offsetWidth;
            ghostBtn.classList.add('shake'); // запускаем тряску

            // 4. обновляем все остальное
            if (bossCurrentHp <= 0) {
                bossMaxHp *= 2;
                bossCurrentHp = bossMaxHp;
                alert("Босс повержен! Следующий уровень!");
            }
            ghostBtn.querySelector('img').classList.add('hit-flash');
            setTimeout(() => {
                ghostBtn.querySelector('img').classList.remove('hit-flash');
            }, 100);

            updateUI();
            if (tg && tg.HapticFeedBack)
            tg.HapticFeedBack.impactOccurred('medium');
        });

        // функция для создания вылетающих элементов
        function createParticle(x, y, text) {
            const el = document.createElement('div');
            el.className = 'particle';
            el.innerText = text;

            // позиционируем в месте клика
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 20}px`;

            // цвет текста
            el.style.color = '#FFD700';
            el.style.textShadow = '2px 2px 0px #000';

            document.body.appendChild(el);

            // удаляем элемент из памяти после завершения анимации
            setTimeout(() => {
                el.remove();
            }, 800);
        }

        let buffInterval = null; // глобальная переменная для таймера

        function buyItem(price, mult, duration) {
            if (score >= price) {
                score -= price;
                updateUI(); // сразу обновляем счет на экране

                // если есть активный таймер то убираем его
                if (buffInterval) clearTimeout(buffInterval);

                // активируем множитель
                tempMultiplier = mult;
                let secondsLeft = duration;
                const statusEl = document.getElementById('buff-status');

                statusEl.innerText = `Усиление x${mult} (${secondsLeft}с)`;

                // запускаем таймер обратного отсчета
                buffInterval = setInterval(() => {
                    secondsLeft--;
                    statusEl.innerText = `Усиление x${mult} (${secondsLeft}с)`;

                    if (secondsLeft <= 0) {
                        clearInterval(buffInterval);
                        tempMultiplier = 1;
                        statusEl.innerText = ""; // скрываем текст когда время вышло
                    }
                }, 1000);

                
                console.log("Куплено: x" + mult);
            } else {
                alert("Мало кликов!");
            }
        }

        function switchTab(tab) {
            const game = document.getElementById('game-screen');
            const shop = document.getElementById('shop-screen');
            const btnBoss = document.getElementById('btn-boss');
            const btnShop = document.getElementById('btn-shop');

            if (tab === 'boss') {
                game.style.display = 'contents';
                shop.style.display = 'none';
                btnBoss.classList.add('active');
                btnShop.classList.remove('active');
            } else {
                game.style.display = 'none';
                shop.style.display = 'block';
                btnBoss.classList.remove('active');
                btnShop.classList.add('active');
            }
        }
    </script>
</body>
</html>
