<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем пиксельный шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Устанавливаем твой фон */
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            user-select: none;
        }

        #score-container {
            margin-top: 50px;
            color: white;
            text-shadow: 2px 2px 5px black;
            font-size: 20px;
            text-align: center;
        }

        /* Стиль призрака-кнопки */
        #ghost-btn {
            background: none;
            border: none;
            outline: none;
            cursor: pointer;
            margin-top: auto;
            margin-bottom: auto;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        #ghost-btn img {
            width: 80vw; /* Ширина призрака — 80% от ширины экрана */
            max-width: 400px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
        }

        /* Эффект нажатия */
        #ghost-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div id="score-container">
        Счет: <span id="score">0</span>
    </div>

    <button id="ghost-btn">
        <img src="ghost.png" alt="Ghost">
    </button>

    <script>
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        let score = 0;
        const scoreElement = document.getElementById('score');
        const btn = document.getElementById('ghost-btn');

        if (tg) {
            tg.expand();
            tg.ready();
        }

        btn.addEventListener('click', () => {
            score++;
            scoreElement.innerText = score;

            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        });
    </script>
</body>
</html>
